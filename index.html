<!--
  我的梦幻小屋 · 房间装扮小游戏（可部署单文件版）
  ============================================
  部署目录结构（index.html 与 images 文件夹同级）：
    your-project/
    ├── index.html        ← 本文件
    └── images/
        ├── manifest.txt  ← 每行一个图片文件名（见下方生成方法）
        ├── 床.png
        ├── 沙发.png
        └── ...其它图片

  生成 manifest.txt（Mac 终端，cd 到 images 文件夹后执行一行）：
    ls *.png *.jpg *.jpeg *.webp 2>/dev/null > manifest.txt
  （Windows PowerShell：  Get-ChildItem -Name *.png,*.jpg,*.jpeg,*.webp > manifest.txt ）

  建议：图片文件名用「床」「沙发」「台灯」这类含中文关键词的名字，程序会自动归类并设好大小。
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>我的梦幻小屋</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    background: linear-gradient(160deg,#fff0f6,#fce7f3 40%,#ede9fe); user-select: none; touch-action: manipulation; }
  header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px;
    background: rgba(255,255,255,.7); backdrop-filter: blur(6px); box-shadow:0 1px 6px rgba(0,0,0,.05); z-index:20; }
  .title { font-weight:700; color:#db2777; font-size:18px; }
  .pill { border:none; cursor:pointer; padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600; transition:.15s; }
  .pill:active { transform: scale(.95); }
  .pink { background:#fbcfe8; color:#be185d; } .pink:hover{ background:#f9a8d4; }
  .rose { background:#ffe4e6; color:#e11d48; } .rose:hover{ background:#fecdd3; }
  .violet{ background:#ddd6fe; color:#5b21b6; } .violet:hover{ background:#c4b5fd; }
  /* ---------- 保存弹窗（拍立得风） ---------- */
  #shotModal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  #shotModal.show { display:flex; animation: fadeIn .25s; }
  #shotModal .polaroid { background:#fff; padding:14px 14px 22px; border-radius:6px; box-shadow:0 30px 60px rgba(0,0,0,.4); transform:rotate(-1.5deg); max-width:92vw; }
  #shotModal .polaroid img { display:block; max-width:min(82vw, 480px); max-height:58vh; border-radius:3px; background:#f3f4f6; }
  #shotModal .cap { text-align:center; font-size:15px; color:#9ca3af; margin-top:10px; font-style:italic; }
  #shotModal .row { display:flex; gap:8px; justify-content:center; margin-top:14px; }
  #shutterFlash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:99; }
  #shutterFlash.flash { animation: flash .35s; }
  @keyframes flash { 0% { opacity:0; } 30% { opacity:.95; } 100% { opacity:0; } }
  @keyframes fadeIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
  #themes { display:none; gap:8px; padding:8px 16px; background:rgba(255,255,255,.6); overflow-x:auto; z-index:20; }
  #themes button { border:none; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px;
    font-size:13px; white-space:nowrap; background:#fff; color:#555; }
  #themes button.on { background:#ec4899; color:#fff; }
  #themes .dot { width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,.7); }
  #room { position:relative; flex:1; overflow:hidden; margin:8px; border-radius:18px; box-shadow: inset 0 2px 10px rgba(0,0,0,.08); touch-action:none; }
  #bg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; display:flex; align-items:center; justify-content:center; background:#fff0f6; }
  #layer { position:absolute; inset:0; }
  .obj { position:absolute; padding:4px; }
  .obj.sel { border-radius:12px; outline:2px solid #f472b6; background:rgba(255,255,255,.3); }
  .obj img { width:100%; height:auto; display:block; pointer-events:none; filter: drop-shadow(0 4px 4px rgba(0,0,0,.12)); }
  .obj .ph { width:100%; aspect-ratio:1; border-radius:10px; background:rgba(251,207,232,.6); border:1px dashed #f9a8d4;
    display:flex; align-items:center; justify-content:center; color:#f472b6; }
  #hint { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; padding:24px; }
  #hint p { color:#ec4899; text-align:center; font-size:14px; background:rgba(255,255,255,.55); border-radius:16px; padding:12px 20px; box-shadow:0 1px 6px rgba(0,0,0,.05); }
  #ctrls { position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:30; display:none; flex-wrap:wrap; justify-content:center;
    gap:6px; padding:6px; border-radius:16px; background:rgba(255,255,255,.88); backdrop-filter:blur(6px); box-shadow:0 6px 18px rgba(0,0,0,.15); max-width:96%; }
  #ctrls button { border:none; cursor:pointer; width:44px; height:44px; border-radius:12px; font-size:18px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.08); transition:.12s; }
  #ctrls button:hover{ background:#fdf2f8; } #ctrls button:active{ transform:scale(.9); }
  #ctrls button.del{ background:#ffe4e6; } #ctrls button.del:hover{ background:#fecdd3; }
  #tabs { display:flex; gap:8px; padding:4px 12px 0; overflow-x:auto; z-index:10; }
  #tabs button { border:none; cursor:pointer; display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:12px 12px 0 0;
    font-size:13px; white-space:nowrap; background:rgba(255,255,255,.5); color:#777; }
  #tabs button.on { background:#fff; color:#db2777; font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,.05); }
  #tabs .count { font-size:10px; background:#fbcfe8; color:#be185d; border-radius:999px; padding:0 6px; }
  #dock { background:rgba(255,255,255,.88); backdrop-filter:blur(6px); padding:12px; z-index:10; box-shadow:0 -4px 12px rgba(0,0,0,.04); touch-action:pan-y; }
  #pal { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-height:130px; overflow-y:auto; }
  #pal .thumb { border:none; cursor:grab; width:56px; height:56px; padding:4px; border-radius:12px; background:#fdf2f8; overflow:hidden;
    display:flex; align-items:center; justify-content:center; touch-action:pan-y; box-shadow:0 1px 3px rgba(0,0,0,.06); transition:.12s; }
  #pal .thumb:active{ transform:scale(.9); }
  #pal .thumb img { max-width:100%; max-height:100%; pointer-events:none; }
  #empty { display:flex; align-items:center; justify-content:center; min-height:90px; text-align:center; font-size:13px; color:#9ca3af;
    border:2px dashed #fbcfe8; border-radius:12px; background:rgba(253,242,248,.4); padding:14px; }
  .tip { text-align:center; font-size:11px; color:#9ca3af; margin-top:6px; }
</style>

<div id="app">
  <header>
    <div class="title">🏡 我的梦幻小屋</div>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">

  <div id="room">
    <div id="bg"></div>
    <div id="layer"></div>
    <div id="hint"><p>✨ 从下方选择家具拖入房间吧</p></div>
    <div id="ctrls"></div>
  </div>

  <div id="tabs"></div>

  <div id="dock">
    <div id="palWrap"></div>
    <div class="tip">📱 单指拖动 · 双指捏合缩放/旋转　💻 选中物品用按钮微调</div>

</div>

<div id="shutterFlash"></div>
<div id="shotModal">

    <div class="row">
      <button class="pill violet" id="btnDownload">⬇️ 下载到本机</button>

</div>

/* AI 生成的多宫格切片 bz_N_rR_cC：按 sheet 行号映射默认大小（参考真实家具比例） */
/* 锚点参考：床/沙发≈22、电视柜≈18、衣柜≈18、餐桌椅≈12、台灯≈11、水壶≈8、洗衣机/冰箱≈14 */

  /* sheet 2 客厅/卧室 */
  "2_0":11,"2_1":7,"2_2":8,"2_3":8,"2_4":11,"2_5":9,
  /* sheet 3 综合家具+家电 */

  "5_0":7,"5_1":6,"5_2":5,"5_3":6,"5_4":7,

  "7_0":7,"7_1":6,"7_2":6,"7_3":5,"7_4":6,
};

  "bz_5_r04_c04.png":11,"bz_5_r04_c05.png":11,  /* 浴缸 */

const BZ_LIGHTS=new Set(["bz_2_r03_c04.png","bz_2_r03_c05.png","bz_3_r02_c02.png","bz_3_r02_c03.png"]);
function bzBase(name){
  if(BZ_CELL_BASE[name]) return BZ_CELL_BASE[name];
  const m=name.match(/^bz_(\d+)_r(\d+)_c\d+\.png$/);
  if(m){ return BZ_ROW_BASE[`${m[1]}_${parseInt(m[2])}`] || 14; }
  return 14;

const angOf=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;

/* ---------- 持久化（部署到自己网站后 localStorage 正常工作） ---------- */
function save(){ try{ localStorage.setItem("dream-room", JSON.stringify({ items: items.map(i=>({...i,url:undefined})), themeIdx, styleIdx })); }catch(e){} }
function loadSaved(){ try{ const s=JSON.parse(localStorage.getItem("dream-room")); if(s){ items=(s.items||[]).filter(i=>i&&i.name); themeIdx=s.themeIdx||0; styleIdx=s.styleIdx||0; zCounter=items.reduce((a,b)=>Math.max(a,b.z||1),1);} }catch(e){} }

/* ---------- 坐标换算 ---------- */
function toPct(cx,cy){ const r=room.getBoundingClientRect();
  return { x:(cx-r.left)/r.width*100, y:(cy-r.top)/r.height*100, inside: cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom }; }

/* ---------- 渲染已放置物品 ---------- */
function updateItemStyle(it){
  const el=itemEls.get(it.id); if(!el) return;
  el.style.left=it.x+"%"; el.style.top=it.y+"%";
  el.style.width=(it.base*it.scale)+"%";
  el.style.transform=`translate(-50%,-50%) rotate(${it.rot}deg) scaleX(${it.flip})`;
  el.style.zIndex=it.z;
}
function renderItems(){
  itemEls.clear(); layer.innerHTML="";
  items.forEach(it=>{
    const el=document.createElement("div");
    el.className="obj"+(it.id===selectedId?" sel":"");
    el.style.touchAction="none"; el.style.cursor="grab";
    el.innerHTML = it.url ? `<img src="${it.url}" draggable="false">` : `<div class="ph">📷</div>`;
    attachGesture(el, it);
    layer.appendChild(el); itemEls.set(it.id, el);
    updateItemStyle(it);
  });
  hint.style.display = items.length? "none":"flex";
  renderCtrls();
}

/* ---------- 单指拖动 + 双指缩放/旋转 ---------- */
function attachGesture(el, item){
  el.addEventListener("pointerdown",(e)=>{
    e.stopPropagation();
    try{ el.setPointerCapture(e.pointerId); }catch(_){}
    selectItem(item.id);
    if(!gesture || gesture.id!==item.id) gesture={ id:item.id, pointers:new Map() };
    gesture.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    baseline(item.id);
  });
  el.addEventListener("pointermove",(e)=>{
    if(!gesture||!gesture.pointers.has(e.pointerId)) return;
    gesture.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const pts=[...gesture.pointers.values()];
    const it=items.find(i=>i.id===gesture.id); if(!it) return;
    if(gesture.mode==="drag"&&pts.length===1){
      const p=toPct(pts[0].x,pts[0].y);
      it.x=clamp(p.x+gesture.dx); it.y=clamp(p.y+gesture.dy); updateItemStyle(it);
    }else if(gesture.mode==="pinch"&&pts.length>=2){
      const[a,b]=pts;
      it.scale=Math.max(.25,Math.min(5, gesture.s0*(distOf(a,b)/gesture.d0)));
      it.rot=gesture.r0+(angOf(a,b)-gesture.a0);
      const c=toPct((a.x+b.x)/2,(a.y+b.y)/2);
      it.x=clamp(c.x+gesture.cdx); it.y=clamp(c.y+gesture.cdy); updateItemStyle(it);
    }
  });
  const up=(e)=>{ if(!gesture) return; gesture.pointers.delete(e.pointerId);
    try{ el.releasePointerCapture(e.pointerId);}catch(_){}
    if(gesture.pointers.size===0){ gesture=null; save(); } else baseline(gesture.id); };
  el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
}
function baseline(id){
  if(!gesture) return; const it=items.find(i=>i.id===id); if(!it) return;
  const pts=[...gesture.pointers.values()];
  if(pts.length===1){ const p=toPct(pts[0].x,pts[0].y); gesture.mode="drag"; gesture.dx=it.x-p.x; gesture.dy=it.y-p.y; }
  else if(pts.length>=2){ const[a,b]=pts; gesture.mode="pinch"; gesture.d0=distOf(a,b)||1; gesture.a0=angOf(a,b);
    gesture.s0=it.scale; gesture.r0=it.rot; const c=toPct((a.x+b.x)/2,(a.y+b.y)/2); gesture.cdx=it.x-c.x; gesture.cdy=it.y-c.y; }
}
room.addEventListener("pointerdown",()=>{ selectItem(null); });

function selectItem(id){
  selectedId=id;
  itemEls.forEach((el,iid)=> el.classList.toggle("sel", iid===id));
  renderCtrls();
}

/* ---------- 选中工具条 ---------- */
function renderCtrls(){
  const it=items.find(i=>i.id===selectedId);
  if(!it){ ctrls.style.display="none"; return; }
  ctrls.style.display="flex";
  const mk=(icon,cls,fn)=>{ const b=document.createElement("button"); b.textContent=icon; if(cls)b.className=cls;
    b.onclick=(e)=>{ e.stopPropagation(); fn(); }; return b; };
  ctrls.innerHTML="";
  ctrls.append(
    mk("➕","",()=>{ it.scale=Math.min(5,it.scale+.12); updateItemStyle(it); save(); }),
    mk("➖","",()=>{ it.scale=Math.max(.25,it.scale-.12); updateItemStyle(it); save(); }),
    mk("↺","",()=>{ it.rot-=15; updateItemStyle(it); save(); }),
    mk("↻","",()=>{ it.rot+=15; updateItemStyle(it); save(); }),
    mk("🔄","",()=>{ it.flip*=-1; updateItemStyle(it); save(); }),
    mk("⬆️","",()=>{ it.z=++zCounter; updateItemStyle(it); save(); }),
    mk("⬇️","",()=>{ const mn=Math.min(...items.map(p=>p.z||1)); it.z=mn-1; updateItemStyle(it); save(); }),
    mk("⧉","",()=>{ const c={...it,id:genId(),x:clamp(it.x+6),y:clamp(it.y+6),z:++zCounter}; items.push(c); selectedId=c.id; renderItems(); save(); }),
    mk("🗑️","del",()=>{ items=items.filter(p=>p.id!==selectedId); selectedId=null; renderItems(); save(); }),
  );
}
ctrls.addEventListener("pointerdown",(e)=>e.stopPropagation());

function renderPalette(){
  const shown = cat==="all"?assets:assets.filter(a=>a.catId===cat);
  if(assets.length===0){
    palWrap.innerHTML=`<div id="empty">还没有图片～<br>请确认 images 文件夹中有素材并已生成 manifest.txt</div>`; return;
  }
  if(shown.length===0){ palWrap.innerHTML=`<div id="empty">这个分类暂时没有图，去「全部」看看吧</div>`; return; }
  const wrap=document.createElement("div"); wrap.id="pal";
  shown.forEach(a=>{
    const b=document.createElement("button"); b.className="thumb"; b.title=a.label;
    b.innerHTML=`<img src="${a.url}" draggable="false">`;
    b.addEventListener("pointerdown",(e)=>startPaletteDrag(e,a));
    wrap.appendChild(b);
  });
  palWrap.innerHTML=""; palWrap.appendChild(wrap);
}
const DRAG_THRESHOLD=8;
function startPaletteDrag(e,a){
  const startX=e.clientX, startY=e.clientY;
  let started=false;
  const spawn=(cx,cy)=>{
    const p=toPct(cx,cy);
    const it={ id:genId(), name:a.name, url:a.url, base:a.base, x:clamp(p.x), y:clamp(p.y), scale:1, rot:0, flip:1, z:++zCounter };
    items.push(it); selectItem(it.id); renderItems();
    dragInfo={ id:it.id, entered:p.inside };
  };
  const onMove=(ev)=>{
    if(!started){
      if(Math.hypot(ev.clientX-startX, ev.clientY-startY) < DRAG_THRESHOLD) return;
      started=true;
      ev.preventDefault && ev.preventDefault();
      spawn(ev.clientX, ev.clientY);
    } else if(dragInfo){
      const p=toPct(ev.clientX, ev.clientY);
      if(p.inside) dragInfo.entered=true;
      const it=items.find(i=>i.id===dragInfo.id);
      if(it){ it.x=clamp(p.x); it.y=clamp(p.y); updateItemStyle(it); }
    }
  };
  const cleanup=()=>{
    window.removeEventListener("pointermove",onMove);
    window.removeEventListener("pointerup",onUp);
    window.removeEventListener("pointercancel",onCancel);
  };
  const onUp=(ev)=>{
    cleanup();
    if(!started){
      // tap → place at default position so user can still tap to add
      const it={ id:genId(), name:a.name, url:a.url, base:a.base, x:50, y:66, scale:1, rot:0, flip:1, z:++zCounter };
      items.push(it); selectItem(it.id); renderItems(); save();
    } else if(dragInfo){
      const it=items.find(i=>i.id===dragInfo.id);
      if(it && !dragInfo.entered){ it.x=50; it.y=66; updateItemStyle(it); }
      dragInfo=null; save();
    }
  };
  const onCancel=()=>{
    // browser took over for scrolling — abort everything
    cleanup();
    if(started && dragInfo){
      items=items.filter(i=>i.id!==dragInfo.id);
      selectedId=null;
      dragInfo=null;
      renderItems();
    }
  };
  window.addEventListener("pointermove",onMove);
  window.addEventListener("pointerup",onUp);
  window.addEventListener("pointercancel",onCancel);
}

/* ---------- 截图保存（拍立得弹窗） ---------- */
function loadImg(src){ return new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=src; }); }
async function generateScreenshot(){
  const rect=room.getBoundingClientRect();
  const W=Math.max(600, Math.round(rect.width*2));
  const H=Math.round(W * rect.height / rect.width);
  const cnv=document.createElement("canvas");
  cnv.width=W; cnv.height=H;
  const ctx=cnv.getContext("2d");
  /* 室外底色（房间外的圆角矩形外侧） */
  ctx.fillStyle=THEMES[themeIdx].ceil;
  ctx.fillRect(0,0,W,H);
  /* 背景 SVG → image */
  const svgEl=bg.querySelector("svg").cloneNode(true);
  svgEl.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const svgStr=new XMLSerializer().serializeToString(svgEl);
  const bgImg=await loadImg("data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svgStr));
  /* SVG viewBox 1000×800，按 meet 居中铺画布 */
  const svgAR=1000/800, cnvAR=W/H;
  let dw,dh,dx,dy;
  if(cnvAR > svgAR){ dh=H; dw=H*svgAR; dx=(W-dw)/2; dy=0; }
  else            { dw=W; dh=W/svgAR; dx=0; dy=(H-dh)/2; }
  ctx.drawImage(bgImg,dx,dy,dw,dh);
  /* 物品按 z 排序绘制 */
  const sorted=items.slice().sort((a,b)=>(a.z||0)-(b.z||0));
  for(const it of sorted){
    if(!it.url) continue;
    try{
      const im=await loadImg(it.url);
      const wPct=it.base*it.scale;
      const w=W*wPct/100;
      const h=w*im.naturalHeight/im.naturalWidth;
      const cx=W*it.x/100, cy=H*it.y/100;
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate((it.rot||0)*Math.PI/180);
      ctx.scale(it.flip||1, 1);
      ctx.drawImage(im, -w/2, -h/2, w, h);
      ctx.restore();
    }catch(e){ /* skip broken */ }
  }
  return cnv.toDataURL("image/png");
}
async function openShot(){
  $("shutterFlash").classList.add("flash");
  setTimeout(()=>$("shutterFlash").classList.remove("flash"), 400);
  try{
    const url=await generateScreenshot();
    $("shotImg").src=url;
    $("shotModal").classList.add("show");
  }catch(e){ alert("生成截图失败："+e); }
}

function setAssets(list){
  assets=list.sort((a,b)=>{ const c=a.catId.localeCompare(b.catId); return c!==0?c:a.name.localeCompare(b.name); });
  const map=Object.fromEntries(assets.map(a=>[a.name,a.url]));
  items.forEach(it=>{ if(it.name&&map[it.name]) it.url=map[it.name]; });

}
